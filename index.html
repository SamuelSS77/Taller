<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="Formulario-Taller"> </div>

<h1> Formulario </h1>

<form id="datosGenerales">
<label>NombreCompleto</label>
<input type="text" id="nombreCompleto">

<label>edad</label>
<input type="number" id="edad">

<label>tipoDeDocumento</label>
<select id="tipoDeDocumento">
            <option value="RC">RC</option>
            <option value="TI">TI</option>
            <option value="CC" selected>CC</option>
            <option value="CE">CE</option>
            <option value="PP">PP</option>
        </select>

<label>numeroDocumento</label>
<input type="text" id="numeroDocumento">

<hr> <!-- Una línea separadora visual -->

<h2>Datos Salariales</h3>

<label>salario</label>
<input type="number" id="salario">

<label>comisiones</label>
<input type="number" id="comisiones">

<label>HorasExtra</label>
<input type="number" id="totalHorasExtras">

<label>NivelDeRiesgo</label>
<label>Nivel de Riesgo</label>
        <select id="nivelRiesgo">
            <option value="0">Nivel I – Riesgo Mínimo</option>
            <option value="1">Nivel II – Riesgo Bajo</option>
            <option value="2">Nivel III – Riesgo Medio</option>
            <option value="3">Nivel IV – Riesgo Alto</option>
            <option value="4">Nivel V – Riesgo Máximo</option>
        </select>

<button type="submit">Calcular Nómina</button>
    </form>



    <script src="scripts.js">
    </script>

</body>
</html>
